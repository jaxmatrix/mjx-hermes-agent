# Standalone pnpm project boundary.
# An empty `packages` list marks this directory as its own workspace root so
# pnpm does NOT fold it into any parent workspace. This app has no internal
# `workspace:` dependencies, so it installs and runs on its own.
packages: []

# Dependencies allowed to run install/build (lifecycle) scripts. pnpm blocks
# these by default; `true` approves the build so pnpm stops prompting.
allowBuilds:
  unicode-animations: true
